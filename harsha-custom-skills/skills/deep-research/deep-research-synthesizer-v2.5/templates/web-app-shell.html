            const cardsView = document.getElementById('cards-view');

            if (STATE.filteredData.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = (STATE.currentView === 'cards') ? 'block' : 'none';
                renderPagination();
                return;
            }

            emptyState.style.display = 'none';

            const startIdx = (STATE.currentPage - 1) * CONFIG.ITEMS_PER_PAGE;
            const endIdx = startIdx + CONFIG.ITEMS_PER_PAGE;
            const pageItems = STATE.filteredData.slice(startIdx, endIdx);

            container.innerHTML = pageItems.map(item => `
                <div class="knowledge-card" data-id="${item.id}">
                    <div class="card-header">
                        <h3 class="card-title">${escapeHtml(item.title)}</h3>
                        <div class="card-meta">
                            ${item.learning_tier ? `<span class="learning-tier-badge tier-${item.learning_tier}"><span class="tier-icon"></span>${item.tier_label || item.learning_tier}</span>` : ''}
                            <span class="confidence-badge confidence-${item.confidence.toLowerCase()}">${item.confidence}</span>
                        </div>
                    </div>

                    <div class="card-tags">
                        <span class="card-tag">${item.category}</span>
                        ${item.subcategory ? `<span class="card-tag">${item.subcategory}</span>` : ''}
                    </div>

                    <p class="card-summary">${escapeHtml(item.summary)}</p>

                    <div class="card-content" data-card-id="${item.id}">
                        <div class="card-content-text">${escapeHtml(item.content)}</div>

                        ${item.gaps && item.gaps.length > 0 ? `
                            <div class="card-gaps">
                                <div class="card-gaps-title">Knowledge Gaps</div>
                                <ul class="card-gaps-list">
                                    ${item.gaps.map(g => `<li>${escapeHtml(g)}</li>`).join('')}
                                </ul>
                            </div>
                        ` : ''}
                    </div>

                    <div class="card-footer">
                        <div class="card-actions">
                            <button class="card-btn expand-btn" data-card-id="${item.id}">Expand</button>
                            <button class="card-btn" data-copy-id="${item.id}" title="Copy to clipboard">📋 Copy</button>
                        </div>
                        <div class="card-source">
                            ${item.source ? `<a href="${item.source}" target="_blank" rel="noopener noreferrer">Source</a>` : ''}
                        </div>
                    </div>

                    ${item.tags && item.tags.length > 0 ? `
                        <div class="card-tags">
                            ${item.tags.map(tag => `<span class="card-tag" data-filter-tag="${tag}">${tag}</span>`).join('')}
                        </div>
                    ` : ''}

                    ${item.related && item.related.length > 0 ? `
                        <div style="border-top: 1px solid var(--border); padding-top: var(--spacing-md);">
                            <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: var(--spacing-sm); text-transform: uppercase; font-weight: 600;">Related</div>
                            <div class="card-related">
                                ${item.related.map(relId => {
                                    const relItem = STATE.data.find(d => d.id === relId);
                                    return relItem ? `<span class="related-link" data-scroll-id="${relId}">${relItem.title}</span>` : '';
                                }).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `).join('');

            // Attach expand handlers
            container.querySelectorAll('.expand-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const cardId = btn.dataset.cardId;
                    const contentDiv = container.querySelector(`[data-card-id="${cardId}"]`);
                    contentDiv.classList.toggle('expanded');
                    btn.classList.toggle('expanded');
                    btn.textContent = contentDiv.classList.contains('expanded') ? 'Collapse' : 'Expand';
                });
            });

            // Attach copy handlers
            container.querySelectorAll('[data-copy-id]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const itemId = btn.dataset.copyId;
                    const item = STATE.data.find(d => d.id === itemId);
                    if (item) {
                        const text = `${item.title}\n${item.summary}\n\n${item.content}`;
                        navigator.clipboard.writeText(text).then(() => {
                            const originalText = btn.textContent;
                            btn.textContent = '✓ Copied';
                            setTimeout(() => { btn.textContent = originalText; }, 2000);
                        });
                    }
                });
            });

            // Attach tag filter handlers
            container.querySelectorAll('[data-filter-tag]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const tag = btn.dataset.filterTag;
                    const idx = STATE.activeFilters.tags.indexOf(tag);

                    if (idx > -1) {
                        STATE.activeFilters.tags.splice(idx, 1);
                    } else {
                        STATE.activeFilters.tags.push(tag);
                    }

                    updateAllFilters();
                });
            });

            // Attach related link handlers
            container.querySelectorAll('[data-scroll-id]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const targetId = link.dataset.scrollId;
                    const targetCard = container.querySelector(`[data-id="${targetId}"]`);
                    if (targetCard) {
                        targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            });

            renderPagination();
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            const totalPages = Math.ceil(STATE.filteredData.length / CONFIG.ITEMS_PER_PAGE);

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = `<button ${STATE.currentPage === 1 ? 'disabled' : ''}>← Previous</button>`;

            for (let i = Math.max(1, STATE.currentPage - 2); i <= Math.min(totalPages, STATE.currentPage + 2); i++) {
                html += `<button class="page-number ${i === STATE.currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            }

            html += `<button ${STATE.currentPage === totalPages ? 'disabled' : ''}>Next →</button>`;

            container.innerHTML = html;

            container.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.textContent.includes('Previous')) {
                        STATE.currentPage = Math.max(1, STATE.currentPage - 1);
                    } else if (btn.textContent.includes('Next')) {
                        STATE.currentPage = Math.min(totalPages, STATE.currentPage + 1);
                    } else {
                        STATE.currentPage = parseInt(btn.dataset.page);
                    }
                    renderCards();
                    document.querySelector('.content-area').scrollTop = 0;
                });
            });
        }

        function renderGraphView() {
            const container = document.getElementById('graph-container');
            container.innerHTML = '';

            const width = container.clientWidth;
            const height = container.clientHeight;

            const nodes = STATE.filteredData.map(item => ({
                id: item.id,
                title: item.title,
                category: item.category,
                summary: item.summary,
                relatedCount: (item.related || []).length
            }));

            const links = [];
            STATE.filteredData.forEach(item => {
                (item.related || []).forEach(relId => {
                    if (STATE.filteredData.find(d => d.id === relId)) {
                        links.push({ source: item.id, target: relId });
                    }
                });
            });

            if (nodes.length === 0) {
                container.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-secondary);">No data to visualize</div>';
                return;
            }

            const svg = d3.select(container).append('svg')
                .attr('width', width)
                .attr('height', height);

            const simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id).distance(80))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('collide', d3.forceCollide().radius(d => Math.sqrt(d.relatedCount) * 10 + 20))
                .force('center', d3.forceCenter(width / 2, height / 2));

            const g = svg.append('g');

            const link = g.selectAll('line')
                .data(links)
                .enter()
                .append('line')
                .attr('stroke', 'var(--border)')
                .attr('stroke-width', 1.5)
                .attr('opacity', 0.6);

            const nodeGroup = g.selectAll('.node-group')
                .data(nodes)
                .enter()
                .append('g')
                .attr('class', 'node-group')
                .style('cursor', 'pointer');

            const circle = nodeGroup.append('circle')
                .attr('r', d => Math.sqrt(d.relatedCount) * 10 + 15)
                .attr('fill', d => {
                    const categoryColor = {
                        'AI & Machine Learning': 'var(--category-ai)',
                        'Web Development': 'var(--category-web)',
                        'Security': 'var(--category-security)',
                        'Database': 'var(--category-database)',
                        'DevOps': 'var(--category-devops)'
                    };
                    return categoryColor[d.category] || 'var(--accent)';
                })
                .attr('opacity', 0.8);

            const text = nodeGroup.append('text')
                .text(d => d.title.length > 20 ? d.title.substring(0, 20) + '...' : d.title)
                .attr('text-anchor', 'middle')
                .attr('dy', '0.3em')
                .style('font-size', '11px')
                .style('fill', 'white')
                .style('font-weight', 'bold')
                .style('pointer-events', 'none');

            nodeGroup.on('mouseenter', function(event, d) {
                const tooltip = document.createElement('div');
                tooltip.className = 'graph-tooltip';
                tooltip.innerHTML = `
                    <div class="graph-tooltip-title">${d.title}</div>
                    <div class="graph-tooltip-summary">${d.summary.substring(0, 100)}...</div>
                `;
                document.body.appendChild(tooltip);

                const rect = tooltip.getBoundingClientRect();
                tooltip.style.left = (event.pageX + 10) + 'px';
                tooltip.style.top = (event.pageY - rect.height - 10) + 'px';

                d3.select(this).select('circle').attr('opacity', 1);

                nodeGroup.on('mouseleave', function() {
                    if (tooltip.parentNode) {
                        tooltip.parentNode.removeChild(tooltip);
                    }
                    d3.select(this).select('circle').attr('opacity', 0.8);
                });
            });

            nodeGroup.on('click', function(event, d) {
                const card = document.querySelector(`[data-id="${d.id}"]`);
                if (card) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });

            svg.on('wheel', function(event) {
                event.preventDefault();
                const scale = event.deltaY > 0 ? 0.9 : 1.1;
                g.attr('transform', `scale(${scale})`);
            });

            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                nodeGroup
                    .attr('transform', d => `translate(${d.x},${d.y})`);
            });
        }

        function renderTableView() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = STATE.filteredData.map(item => `
                <tr>
                    <td>${escapeHtml(item.title)}</td>
                    <td>${item.category}</td>
                    <td class="table-confidence"><span class="confidence-badge confidence-${item.confidence.toLowerCase()}">${item.confidence}</span></td>
                    <td>${(item.tags || []).join(', ')}</td>
                    <td>${item.date_processed}</td>
                </tr>
            `).join('');

            tbody.querySelectorAll('tr').forEach(row => {
                row.addEventListener('click', () => {
                    const title = row.querySelector('td').textContent;
                    const item = STATE.filteredData.find(d => d.title === title);
                    if (item) {
                        const card = document.querySelector(`[data-id="${item.id}"]`);
                        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            });
        }

        function updateDashboard() {
            // Stats
            document.getElementById('stat-total').textContent = STATE.data.length;
            const verified = STATE.data.filter(d => d.confidence === 'VERIFIED').length;
            document.getElementById('stat-verified').textContent = verified;
            const highQuality = STATE.data.filter(d => ['VERIFIED', 'HIGH'].includes(d.confidence)).length;
            const coverage = Math.round((highQuality / STATE.data.length) * 100);
            document.getElementById('stat-coverage').textContent = coverage + '%';

            // Category chart
            const categories = {};
            STATE.data.forEach(item => {
                categories[item.category] = (categories[item.category] || 0) + 1;
            });

            const maxCat = Math.max(...Object.values(categories));
            const categoryChart = document.getElementById('category-chart');
            categoryChart.innerHTML = Object.entries(categories)
                .map(([cat, count]) => `
                    <div class="bar-item">
                        <div class="bar-label">${cat}</div>
                        <div class="bar-fill" style="width: ${(count / maxCat) * 100}%">
                            <span class="bar-value">${count}</span>
                        </div>
                    </div>
                `).join('');

            // Confidence chart
            const confidenceLevels = { VERIFIED: 0, HIGH: 0, MEDIUM: 0, LOW: 0, UNKNOWN: 0 };
            STATE.data.forEach(item => {
                confidenceLevels[item.confidence]++;
            });

            const total = STATE.data.length;
            const confidenceChart = document.getElementById('confidence-chart');
            confidenceChart.innerHTML = Object.entries(confidenceLevels)
                .map(([level, count]) => `
                    <div class="bar-item">
                        <div class="bar-label">${level}</div>
                        <div class="bar-fill" style="width: ${(count / total) * 100}%; background: linear-gradient(90deg, var(--confidence-${level.toLowerCase()}), var(--confidence-${level.toLowerCase()}));">
                            <span class="bar-value">${Math.round((count / total) * 100)}%</span>
                        </div>
                    </div>
                `).join('');

            // Top tags
            const tagCounts = {};
            STATE.data.forEach(item => {
                (item.tags || []).forEach(tag => {
                    tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                });
            });

            const topTags = Object.entries(tagCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            const maxTags = Math.max(...topTags.map(t => t[1]));
            const tagsChart = document.getElementById('tags-chart');
            tagsChart.innerHTML = topTags
                .map(([tag, count]) => `
                    <div class="bar-item">
                        <div class="bar-label">${tag}</div>
                        <div class="bar-fill" style="width: ${(count / maxTags) * 100}%">
                            <span class="bar-value">${count}</span>
                        </div>
                    </div>
                `).join('');
        }

        function updateFooter() {
            const now = new Date().toLocaleDateString();
            document.getElementById('footer-info').textContent =
                `Generated ${now} | ${STATE.data.length} entries`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========================================
        // EVENT LISTENERS
        // ========================================
        function attachEventListeners() {
            // Search
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', (e) => {
                updateSearchSuggestions(e.target.value);
                performSearch(e.target.value);
            });

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    searchInput.value = '';
                    performSearch('');
                }
            });

            // Theme toggle
            document.getElementById('theme-toggle').addEventListener('click', () => {
                setTheme(!STATE.isDarkMode);
            });

            // Dashboard toggle
            document.getElementById('dashboard-toggle').addEventListener('click', () => {
                document.getElementById('dashboard').classList.toggle('open');
            });

            // View toggle — single authoritative handler for ALL views including learning-path
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    STATE.currentView = btn.dataset.view;

                    // Hide ALL views consistently using style.display
                    const allViews = ['cards-view', 'graph-view', 'table-view', 'learning-path-view'];
                    allViews.forEach(viewId => {
                        const el = document.getElementById(viewId);
                        if (el) el.style.display = 'none';
                    });

                    if (STATE.currentView === 'cards') {
                        document.getElementById('cards-view').style.display = 'block';
                    } else if (STATE.currentView === 'graph') {
                        document.getElementById('graph-view').style.display = 'block';
                        renderGraphView();
                    } else if (STATE.currentView === 'table') {
                        document.getElementById('table-view').style.display = 'block';
                        renderTableView();
                    } else if (STATE.currentView === 'learning-path') {
                        document.getElementById('learning-path-view').style.display = 'block';
                        renderLearningPath();
                    }
                });
            });

            // Export
            document.getElementById('export-btn').addEventListener('click', () => {
                const dataStr = JSON.stringify(STATE.filteredData, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `knowledge-base-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            });

            // Mobile menu
            const mobileToggle = document.querySelector('.mobile-menu-toggle');
            if (mobileToggle) {
                mobileToggle.addEventListener('click', () => {
                    const sidebar = document.getElementById('sidebar');
                    const backdrop = document.getElementById('sidebar-backdrop');
                    sidebar.classList.toggle('open');
                    backdrop.classList.toggle('visible');
                    mobileToggle.classList.toggle('open');
                });
            }

            const backdrop = document.getElementById('sidebar-backdrop');
            if (backdrop) {
                backdrop.addEventListener('click', () => {
                    document.getElementById('sidebar').classList.remove('open');
                    backdrop.classList.remove('visible');
                    document.querySelector('.mobile-menu-toggle').classList.remove('open');
                });
            }

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    document.getElementById('search-input').focus();
                }

                if (!['input', 'textarea'].includes(document.activeElement.tagName.toLowerCase())) {
                    if (e.key === '1') STATE.currentPage = 1;
                    if (e.key === '2') STATE.currentPage = 1;
                    if (e.key === '3') STATE.currentPage = 1;
                }
            });
        }

        function loadRecentSearches() {
            const saved = localStorage.getItem('kb-recent-searches');
            if (saved) {
                try {
                    STATE.recentSearches = JSON.parse(saved);
                } catch (e) {
                    STATE.recentSearches = [];
                }
            }
        }

        // ========================================
        // LEARNING MODE SUPPORT
        // ========================================

        /**
         * Detect if learning mode should be active based on entry metadata.
         * Learning mode is activated by build_knowledge_app.py --learning-mode flag,
         * which sets learning_tier on each entry node.
         */
        function initLearningMode() {
            const hasLearningTiers = STATE.data.some(item => item.learning_tier);
            if (!hasLearningTiers) return;

            STATE.learningModeActive = true;

            // Show Learning Path button (the generic view-toggle handler already
            // covers the 'learning-path' data-view, so no extra listener needed)
            const lpBtn = document.getElementById('learning-path-btn');
            if (lpBtn) lpBtn.style.display = '';

            // Re-render sidebar with learning-mode tier navigation
            renderSidebar();
        }

        /**
         * Topological sort on dependency edges to determine learning order.
         */
        function topologicalSortEntries(entries, graphData) {
            if (!graphData || !graphData.edges) return entries.map(e => e.id);

            const depEdges = graphData.edges.filter(e => e.type === 'dependency');
            if (depEdges.length === 0) return entries.map(e => e.id);

            const inDegree = {};
            const adjList = {};
            entries.forEach(n => { inDegree[n.id] = 0; adjList[n.id] = []; });

            depEdges.forEach(e => {
                const src = typeof e.target === 'object' ? e.target.id : e.target;
                const tgt = typeof e.source === 'object' ? e.source.id : e.source;
                if (adjList[src]) adjList[src].push(tgt);
                if (inDegree[tgt] !== undefined) inDegree[tgt]++;
            });

            const queue = [];
            const sorted = [];
            for (const nodeId in inDegree) {
                if (inDegree[nodeId] === 0) queue.push(nodeId);
            }
            while (queue.length > 0) {
                const current = queue.shift();
                sorted.push(current);
                for (const neighbor of (adjList[current] || [])) {
                    inDegree[neighbor]--;
                    if (inDegree[neighbor] === 0) queue.push(neighbor);
                }
            }
            // Append any remaining (cycle members)
            const sortedSet = new Set(sorted);
            entries.forEach(n => { if (!sortedSet.has(n.id)) sorted.push(n.id); });

            return sorted;
        }

        /**
         * Render the Learning Path view — entries ordered by dependency with tier grouping.
         */
        function renderLearningPath() {
            const container = document.getElementById('learning-path-content');
            if (!container) return;

            const graphData = window.__GRAPH_DATA__ || {};
            const sortedIds = topologicalSortEntries(STATE.data, graphData);

            // Group by tier, maintaining topological order
            const tiers = {
                foundation: { label: 'Foundation', icon: '🟢', color: '#059669', entries: [] },
                intermediate: { label: 'Intermediate', icon: '🟡', color: '#d97706', entries: [] },
                advanced: { label: 'Advanced', icon: '🔴', color: '#dc2626', entries: [] }
            };

            let counter = 1;
            sortedIds.forEach(id => {
                const entry = STATE.data.find(e => e.id === id);
                if (!entry) return;
                const tier = entry.learning_tier || 'foundation';
                if (tiers[tier]) {
                    tiers[tier].entries.push({ ...entry, learningOrder: counter++ });
                }
            });

            let html = '';
            for (const [tierKey, tier] of Object.entries(tiers)) {
                if (tier.entries.length === 0) continue;
                html += `
                    <div class="learning-tier-section">
                        <div class="learning-tier-header">
                            <span class="learning-tier-badge tier-${tierKey}"><span class="tier-icon"></span>${tier.label}</span>
                            <h3>${tier.label} Concepts</h3>
                            <span class="tier-count">${tier.entries.length} entries</span>
                        </div>
                `;

                tier.entries.forEach(entry => {
                    // Find prerequisites
                    const depEdges = (graphData.edges || []).filter(e => {
                        const src = typeof e.source === 'object' ? e.source.id : e.source;
                        return src === entry.id && e.type === 'dependency';
                    });
                    const prereqs = depEdges.map(e => {
                        const tgtId = typeof e.target === 'object' ? e.target.id : e.target;
                        const prereq = STATE.data.find(d => d.id === tgtId);
                        return prereq ? prereq.title : tgtId;
                    });

                    html += `
                        <div class="learning-path-entry tier-${tierKey}" data-entry-id="${entry.id}" onclick="this.classList.toggle('expanded')">
                            <div class="entry-number">Step ${entry.learningOrder}</div>
                            <div class="entry-title">${escapeHtml(entry.title)}</div>
                            ${prereqs.length > 0 ? `<div class="entry-prereqs">Builds on: ${prereqs.map(p => escapeHtml(p)).join(', ')}</div>` : ''}
                            <div class="entry-summary">${escapeHtml(entry.summary || entry.content.substring(0, 200) + '...')}</div>
                        </div>
                    `;
                });

                html += '</div>';
            }

            container.innerHTML = html || '<p style="color:var(--text-muted);">No learning path data available. Rebuild with --learning-mode flag.</p>';
        }

    </script>
</body>
